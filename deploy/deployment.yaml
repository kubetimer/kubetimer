---
# KubeTimer Operator Deployment
# This runs the operator inside your Kubernetes cluster

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubetimer-operator
  namespace: kubetimer-system
  labels:
    app: kubetimer-operator
spec:
  replicas: 1  # Only 1 replica needed because of Kopf (https://kopf.readthedocs.io/en/stable/deployment/#cluster-deployment)
  selector:
    matchLabels:
      app: kubetimer-operator
  template:
    metadata:
      labels:
        app: kubetimer-operator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kubetimer-operator
      containers:
        - name: operator
          image: ryanjorgeac/kubetimer:v0.2.2-metrics
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: KUBETIMER_LOG_LEVEL
              value: "INFO"
            - name: KUBETIMER_LOG_FORMAT
              value: "text"
            - name: KUBETIMER_KOPF_LOG_LEVEL
              value: "WARNING"
            - name: KUBETIMER_ANNOTATION_KEY
              value: "kubetimer.io/ttl"
            - name: KUBETIMER_NAMESPACE_EXCLUDE
              value: "kube-system,kube-public,kube-node-lease"
            - name: KUBETIMER_NAMESPACE_INCLUDE
              value: "" # Empty means all namespaces are included (except those in EXCLUDE)
            - name: KUBETIMER_TIMEZONE
              value: "America/Sao_Paulo"
            - name: KUBETIMER_DRY_RUN
              value: "false"
            - name: KUBETIMER_METRICS_ENABLED
              value: "true"
            - name: KUBETIMER_METRICS_PORT
              value: "9091"

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
